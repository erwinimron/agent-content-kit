name: Content Pipeline

on:
  # Manual trigger
  workflow_dispatch:
  
  # Schedule: setiap jam 9 pagi UTC (16:00 WIB)
  schedule:
    - cron: '0 9 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run content pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m custom_pipeline.pipeline

      - name: Send error notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os
          import requests
          
          token = os.getenv('TELEGRAM_BOT_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          
          if not token or not chat_id:
              print('⚠️ Telegram credentials not set')
              exit(0)
          
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          payload = {
              'chat_id': chat_id,
              'text': '❌ <b>Pipeline FAILED!</b>\n\nContent generation gagal. Cek log GitHub Actions untuk detail.',
              'parse_mode': 'HTML'
          }
          
          response = requests.post(url, json=payload)
          if response.status_code == 200:
              print('✅ Error notification sent to Telegram')
          else:
              print(f'❌ Failed to send error: {response.text}')
          "
